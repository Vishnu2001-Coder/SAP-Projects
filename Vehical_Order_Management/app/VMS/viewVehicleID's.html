<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vehicle IDs</title>

<style>

body{
font-family:Segoe UI;
background:#0d1b2a;
color:white;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

th{
background:#e63946;
color:white;
}

button{
padding:8px 15px;
background:#e63946;
color:white;
border:none;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<h2>Vehicle IDs</h2>

<table id="vehicleTable">

<thead>
<tr>
<th>Vehicle ID</th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button onclick="window.location.href='dashboard.html'">
Back
</button>

<script>

async function loadVehicles(){

const res = await fetch("/odata/v4/vehicle/VeiwVehicles");
const data = await res.json();

const vehicles = data.value;

const tableBody = document.querySelector("#vehicleTable tbody");

vehicles.forEach(v => {

const row = document.createElement("tr");

row.innerHTML = `
<td>${v.vehicleId}</td>
`;

tableBody.appendChild(row);

});

}

loadVehicles();

</script>

</body>
</html>
