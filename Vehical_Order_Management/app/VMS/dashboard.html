<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vehicle Order Management Dashboard</title>

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
color:white;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1503376780353-7e6692767b70");
background-size:cover;
background-position:center;
min-height:100vh;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.6);
}

.logo{
font-size:22px;
font-weight:600;
}

.backBtn{
text-decoration:none;
color:white;
background:#e63946;
padding:8px 18px;
border-radius:5px;
}

/* DASHBOARD GRID */

.container{
padding:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

/* CARDS */

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(6px);
border-radius:10px;
padding:30px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.2);
}

.card h3{
margin-bottom:15px;
}

.card a{
text-decoration:none;
background:#e63946;
color:white;
padding:10px 20px;
border-radius:5px;
display:inline-block;
}

.card a:hover{
background:#c71c2c;
}

</style>
</head>

<body>

<header>

<div class="logo">
🚗 Vehicle Order Management
</div>

<a class="backBtn" href="index.html">
Home
</a>

</header>

<div class="container">

<div class="card">
<h3>Add Vehicle</h3>
<a href="addVehicle.html">Open</a>
</div>

<div class="card">
<h3>Update Vehicle</h3>
<a href="updateVehicle.html">Open</a>
</div>

<div class="card">
<h3>View Dealers</h3>
<a href="viewDealers.html">Open</a>
</div>

<div class="card">
<h3>View States</h3>
<a href="viewStates.html">Open</a>
</div>

<div class="card">
<h3>View Vehicle IDs</h3>
<a href="viewVehicleID's.html">Open</a>
</div>

<div class="card">
<h3>View State IDs</h3>
<a href="viewStatesID's.html">Open</a>
</div>

</div>
</body>
</html>
