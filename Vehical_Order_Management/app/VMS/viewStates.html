<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>States</title>

<style>

body{
font-family:Segoe UI;
background:#0d1b2a;
color:white;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

th{
background:#e63946;
color:white;
}

button{
padding:8px 15px;
background:#e63946;
color:white;
border:none;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<h2>States</h2>

<table id="stateTable">

<thead>
<tr>
<th>State ID</th>
<th>State Name</th>
<th>State Code</th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button onclick="window.location.href='dashboard.html'">
Back
</button>

<script>

async function loadStates(){

const res = await fetch("/odata/v4/vehicle/States");
const data = await res.json();

const states = data.value;

const tableBody = document.querySelector("#stateTable tbody");

states.forEach(s => {

const row = document.createElement("tr");

row.innerHTML = `
<td>${s.stateId}</td>
<td>${s.stateName}</td>
<td>${s.stateCode}</td>
`;

tableBody.appendChild(row);

});

}

loadStates();

</script>

</body>
</html>
